apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lakehouse-cloud
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: cloud
    team: data-platform
spec:
  project: lakehouse

  source:
    repoURL: https://github.com/yvan-ai/real-time-lakehouse
    targetRevision: main
    path: infra/kubernetes/overlays/cloud   # scaffold — create overlay when cloud is ready

  destination:
    server: https://your-cloud-k8s-api-server   # replace with actual cloud cluster API URL
    namespace: lakehouse

  syncPolicy:
    automated:
      prune: true       # remove resources deleted from Git
      selfHeal: true    # revert out-of-band changes
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: kafka.strimzi.io
      kind: Kafka
      jsonPointers:
        - /status
    - group: flink.apache.org
      kind: FlinkDeployment
      jsonPointers:
        - /status
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
