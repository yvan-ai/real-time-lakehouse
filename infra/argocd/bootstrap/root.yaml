---
# Root application (app-of-apps). It reconciles infra/argocd/control-plane
# from git: the lakehouse AppProject and the lakehouse-envs ApplicationSet,
# which in turn generates the per-environment applications
# (lakehouse-dev / lakehouse-staging / lakehouse-prod) — see ADR-0012.
#
# Bootstrap order (bootstrap.sh): the AppProject must be applied once before
# this file — the core install ships no `default` project, and an Application
# referencing a missing project is rejected. After that first apply the root
# app manages the project from git like everything else.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lakehouse-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    team: data-platform
spec:
  project: lakehouse

  source:
    repoURL: https://github.com/yvan-ai/real-time-lakehouse
    targetRevision: main
    path: infra/argocd/control-plane

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    # Control-plane objects are small and fully git-defined: prune is safe
    # here (unlike the data plane, where Jobs/ConfigMaps live outside git).
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
