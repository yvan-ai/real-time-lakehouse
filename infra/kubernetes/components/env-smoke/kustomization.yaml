apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Shared verification slice for the promoted environments (staging, prod) —
# included by their overlays, which pin the spark-batch image tag and set the
# target namespace. See ADR-0012.

resources:
  - smoke-job.yaml
  - release-info.yaml

configMapGenerator:
  - name: env-smoke-script
    files:
      - smoke_check.py
