apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No global namespace here — each base sets its own:
#   minio base  → lakehouse
#   kafka base  → streaming
#   kafka-topics → streaming

resources:
  - ../../base/minio
  - ../../base/postgres
  - ../../base/kafka
  - ../../base/flink
  - ../../base/nessie
  - ../../base/trino
  - ../../base/monitoring
  - ../../base/marquez
  - ../../base/airflow
  - ../../../../pipelines/streaming/kafka-topics
  - ../../../../pipelines/streaming/kafka-connect
  - ../../../../pipelines/orchestration
  - ../../../../pipelines/dbt

# Secrets are NOT part of this overlay: their env files are gitignored, so
# ArgoCD could not build the overlay from git. They live in ./secrets/
# (applied by bootstrap.sh / deploy.sh only) — see secrets/kustomization.yaml.
