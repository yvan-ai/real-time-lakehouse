apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No global namespace here — each base sets its own:
#   minio base  → lakehouse
#   kafka base  → streaming
#   kafka-topics → streaming

resources:
  - ../../base/minio
  - ../../base/postgres
  - ../../base/kafka
  - ../../base/flink
  - ../../base/nessie
  - ../../base/trino
  - ../../base/monitoring
  - ../../base/marquez
  - ../../base/airflow
  - ../../../../pipelines/streaming/kafka-topics
  - ../../../../pipelines/streaming/kafka-connect
  - ../../../../pipelines/orchestration
  - ../../../../pipelines/dbt

secretGenerator:
  - name: minio-credentials
    namespace: lakehouse
    envs:
      - minio.env
    options:
      disableNameSuffixHash: true
  # Marquez DB credentials — rendered in both namespaces: the marquez pod
  # (lineage) and the db-init Job next to Postgres (streaming).
  - name: marquez-db-credentials
    namespace: lineage
    envs:
      - marquez.env
    options:
      disableNameSuffixHash: true
  - name: marquez-db-credentials
    namespace: streaming
    envs:
      - marquez.env
    options:
      disableNameSuffixHash: true
  # Airflow credentials — rendered in both namespaces: the airflow pod
  # (orchestration) and the db-init Job next to Postgres (streaming).
  - name: airflow-credentials
    namespace: orchestration
    envs:
      - airflow.env
    options:
      disableNameSuffixHash: true
  - name: airflow-credentials
    namespace: streaming
    envs:
      - airflow.env
    options:
      disableNameSuffixHash: true
