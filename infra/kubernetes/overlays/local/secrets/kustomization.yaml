apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Secrets live OUTSIDE the main overlay on purpose: the env files are
# gitignored, so the ArgoCD repo-server could never render an overlay that
# references them. This kustomization is applied only by bootstrap.sh /
# deploy.sh (kubectl apply -k …/secrets); ArgoCD tracks the main overlay and,
# with prune disabled, leaves these Secrets alone.

secretGenerator:
  - name: minio-credentials
    namespace: lakehouse
    envs:
      - minio.env
    options:
      disableNameSuffixHash: true
  # Marquez DB credentials — rendered in both namespaces: the marquez pod
  # (lineage) and the db-init Job next to Postgres (streaming).
  - name: marquez-db-credentials
    namespace: lineage
    envs:
      - marquez.env
    options:
      disableNameSuffixHash: true
  - name: marquez-db-credentials
    namespace: streaming
    envs:
      - marquez.env
    options:
      disableNameSuffixHash: true
  # Airflow credentials — rendered in both namespaces: the airflow pod
  # (orchestration) and the db-init Job next to Postgres (streaming).
  - name: airflow-credentials
    namespace: orchestration
    envs:
      - airflow.env
    options:
      disableNameSuffixHash: true
  - name: airflow-credentials
    namespace: streaming
    envs:
      - airflow.env
    options:
      disableNameSuffixHash: true
  # Grafana admin password — the deployment used to hardcode it (fixed
  # 2026-07-19); Grafana's DB is ephemeral, so a pod roll re-applies it.
  - name: grafana-credentials
    namespace: monitoring
    envs:
      - grafana.env
    options:
      disableNameSuffixHash: true
