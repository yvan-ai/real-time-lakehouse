apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# prod — the gated end of the promotion chain (ADR-0012).
# Same verification slice as staging; what differs is the sync policy: the
# lakehouse-prod application has NO automated sync, so a promotion commit
# leaves it OutOfSync until a human triggers `scripts/promote.sh prod --sync`.
# On a multi-cluster setup this overlay would include the full base list.

namespace: lakehouse-prod

resources:
- namespace.yaml

components:
- ../../components/env-smoke

labels:
- pairs:
    environment: prod

# Promoted by `scripts/promote.sh prod` (strict chain: prod only ever
# receives the tag staging currently runs). `kustomize edit set image`
# rewrites this block.
images:
- name: spark-batch
  newName: ghcr.io/yvan-ai/real-time-lakehouse/spark-batch
  newTag: sha-f41896b

# Mirror the promoted image into the tracked release-info ConfigMap: the
# smoke Job is a hook (excluded from the sync diff), so this is what makes a
# promotion turn the app OutOfSync and re-run the smoke.
replacements:
- source:
    fieldPath: spec.template.spec.containers.0.image
    kind: Job
    name: env-smoke
  targets:
  - fieldPaths:
    - data.image
    select:
      kind: ConfigMap
      name: release-info
