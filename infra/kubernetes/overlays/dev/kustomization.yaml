apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# dev — the full platform, materialised as-is from the local overlay.
# `local` keeps its name because scripts (deploy.sh, bootstrap.sh) and the
# secrets kustomization apply it directly; this wrapper gives the environment
# its ArgoCD identity (application lakehouse-dev, generated by the
# lakehouse-envs ApplicationSet — ADR-0012).
#
# Image tags for dev live in the bases (infra/kubernetes/base/*/kustomization
# .yaml, pipelines/streaming/kafka-connect/kustomization.yaml): the CD
# workflow bumps them on every main build. staging/prod pin their own tags in
# their overlays — `scripts/promote.sh` moves them forward.

resources:
  - ../local
