apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: lakehouse
  labels:
    app: minio
    app.kubernetes.io/part-of: real-time-lakehouse
spec:
  selector:
    app: minio
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
