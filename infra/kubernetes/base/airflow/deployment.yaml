---
# Airflow — standalone-style deployment (ADR-0009).
# Scheduler + webserver as two processes in ONE container (LocalExecutor):
# the smallest footprint that still gives scheduling, retries and the UI.
# Metadata DB: `airflow` database in the existing Postgres (streaming ns),
# created by db-init-job.yaml (applied by bootstrap.sh, like marquez-db-init).
# Actual work runs as KubernetesPodOperator pods in spark / data-quality /
# lineage namespaces — see rbac.yaml and pipelines/orchestration/dags/.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: orchestration
  labels:
    app: airflow
    app.kubernetes.io/part-of: real-time-lakehouse
spec:
  replicas: 1
  # Recreate: the orchestration quota fits exactly one Airflow pod — a
  # rolling update would leave the replacement Pending forever.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      serviceAccountName: airflow
      containers:
        - name: airflow
          image: apache/airflow:2.10.4
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              db_host="postgres.streaming.svc.cluster.local:5432"
              export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${db_host}/airflow"
              airflow db migrate
              airflow users create \
                --username admin --password "${AIRFLOW_ADMIN_PASSWORD}" \
                --firstname Lakehouse --lastname Admin \
                --role Admin --email admin@lakehouse.local || true
              airflow scheduler &
              exec airflow webserver --port 8080
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /opt/airflow/dags
            # 4 parallel task slots is plenty: the DAG is a straight line and
            # every task is a pod in another namespace.
            - name: AIRFLOW__CORE__PARALLELISM
              value: "4"
            # 1 gunicorn worker (default 4): even at the full 1536Mi quota
            # the pod OOMed while a DAG ran (scheduler + webserver + task
            # monitoring peaks, seen live 2026-07-19). Demo-box trade-off:
            # slightly slower UI, stable pod.
            - name: AIRFLOW__WEBSERVER__WORKERS
              value: "1"
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-credentials
                  key: AIRFLOW_WEBSERVER_SECRET_KEY
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-credentials
                  key: AIRFLOW_FERNET_KEY
            - name: AIRFLOW_DB_USER
              valueFrom:
                secretKeyRef:
                  name: airflow-credentials
                  key: AIRFLOW_DB_USER
            - name: AIRFLOW_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airflow-credentials
                  key: AIRFLOW_DB_PASSWORD
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airflow-credentials
                  key: AIRFLOW_ADMIN_PASSWORD
          ports:
            - name: web
              containerPort: 8080
          # Migrations + scheduler boot take a while on the shared Postgres:
          # give it up to 5 minutes before liveness kicks in.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
              readOnly: true
            - name: logs
              mountPath: /opt/airflow/logs
          resources:
            requests:
              # CPU request kept minimal — the node runs close to its
              # requests ceiling (same rationale as the quality gate).
              memory: 768Mi
              cpu: 200m
            limits:
              # Full orchestration quota: 1280Mi OOM-looped the standalone
              # pod (scheduler + 2-worker webserver) once the node filled up
              # — 115 restarts over 9 days, seen live 2026-07-19.
              memory: 1536Mi
              cpu: "1500m"
      volumes:
        # Generated by kustomize from pipelines/orchestration/dags/ — DAG
        # changes ship with `kubectl apply -k`, not by exec-ing into the pod.
        - name: dags
          configMap:
            name: airflow-dags
        - name: logs
          emptyDir:
            sizeLimit: 256Mi
