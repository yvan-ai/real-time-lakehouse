---
# Quality gate — runs the Great Expectations checkpoints against Trino after
# a batch run. Applied by scripts/run-quality-gate.sh (NOT part of the overlay:
# Jobs are immutable, so repeated `kubectl apply -k` would fail).
#
# The GX project (great_expectations.yml, runner.py, suites, checkpoints) is
# mounted from ConfigMaps created by the script, assembled into a writable
# emptyDir (GX needs uncommitted/ for validations + data docs).
#
# Failure semantics: any failed expectation ⇒ runner.py exits 1 ⇒ Job Failed
# (backoffLimit 0). kube-state-metrics exposes the state for alerting
# (QualityGateFailed) and the Job pushes gx_* metrics to the Pushgateway.
apiVersion: batch/v1
kind: Job
metadata:
  name: quality-gate
  namespace: data-quality
  labels:
    app: quality-gate
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: quality
spec:
  backoffLimit: 0
  # Keep the finished Job visible for a day so the red/green state is
  # inspectable and alertable well after the run.
  ttlSecondsAfterFinished: 86400
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app: quality-gate
    spec:
      restartPolicy: Never
      containers:
        - name: quality-gate
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "[1/3] Installing quality dependencies..."
              # Generous retries: runtime downloads are the #1 transient
              # failure on this cluster (same risk as the Spark --packages).
              pip install --no-cache-dir --quiet --retries 10 --timeout 60 \
                -r /gx-src/requirements-quality.txt

              echo "[2/3] Assembling GX project..."
              mkdir -p /gx/expectations /gx/checkpoints /gx/uncommitted
              cp /gx-src/great_expectations.yml /gx-src/runner.py /gx/
              cp /gx-src-expectations/*.json /gx/expectations/
              cp /gx-src-checkpoints/*.yml /gx/checkpoints/

              echo "[3/3] Running checkpoints against Trino..."
              cd /gx && python runner.py --layer all
          env:
            - name: GX_TRINO_CONNECTION_STRING
              value: "trino://admin@trino.lakehouse.svc.cluster.local:8080/iceberg"
            - name: PUSHGATEWAY_URL
              value: "http://pushgateway.monitoring.svc.cluster.local:9091"
          resources:
            requests:
              # CPU request kept minimal: the node runs at >95% CPU requests
              # and the gate is a short-lived, burst-tolerant batch pod.
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: gx-project
              mountPath: /gx-src
            - name: gx-expectations
              mountPath: /gx-src-expectations
            - name: gx-checkpoints
              mountPath: /gx-src-checkpoints
            - name: gx-workdir
              mountPath: /gx
      volumes:
        - name: gx-project
          configMap:
            name: quality-gate-project
        - name: gx-expectations
          configMap:
            name: quality-gate-expectations
        - name: gx-checkpoints
          configMap:
            name: quality-gate-checkpoints
        - name: gx-workdir
          emptyDir: {}
