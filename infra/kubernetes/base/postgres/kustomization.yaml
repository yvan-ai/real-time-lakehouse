apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: streaming

resources:
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - exporter.yaml
  # postgres-credentials.yaml (ExternalSecret) excluded — requires ESO CRDs.
  # Create the secret manually before applying:
  #   kubectl create secret generic postgres-credentials -n streaming \
  #     --from-literal=username=postgres \
  #     --from-literal=password=<admin_password> \
  #     --from-literal=debezium-password=<debezium_password>
  # Uncomment when ESO is installed:
  # - postgres-credentials.yaml
