# Production: ExternalSecret (External Secrets Operator + Vault/AWS SM).
# For local dev, create the Secret manually:
#
#   kubectl create secret generic postgres-credentials \
#     --namespace streaming \
#     --from-literal=username=postgres \
#     --from-literal=password=<admin_password> \
#     --from-literal=debezium-password=<debezium_password>
#
# Never commit plaintext credentials.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: streaming
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/streaming/postgres-admin
        property: username
    - secretKey: password
      remoteRef:
        key: secret/streaming/postgres-admin
        property: password
    - secretKey: debezium-password
      remoteRef:
        key: secret/streaming/debezium
        property: password
