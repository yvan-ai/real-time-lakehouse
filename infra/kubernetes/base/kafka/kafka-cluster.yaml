# KRaft single-node Kafka for local dev (no ZooKeeper).
# Combined controller+broker role on one pod — ephemeral storage (no PVC).
# Fits within streaming namespace quota: 768Mi req / 1.5Gi limit for all Kafka pods.
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: combined
  namespace: streaming
  labels:
    strimzi.io/cluster: kafka-dev
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m
  jvmOptions:
    -Xms: 256m
    -Xmx: 512m
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-dev
  namespace: streaming
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      # Host access for local clients (demo dashboard, kcat) — k3s runs on the
      # same machine, so the node address is localhost.
      - name: external
        port: 9094
        type: nodeport
        tls: false
        configuration:
          bootstrap:
            nodePort: 32100
          brokers:
            - broker: 0
              advertisedHost: localhost
              nodePort: 32101
    config:
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      default.replication.factor: "1"
      min.insync.replicas: "1"
      log.retention.hours: "24"
      log.segment.bytes: "67108864"
    # JMX Prometheus Exporter — exposes broker metrics on :9404.
    # Config lives in the kafka-metrics ConfigMap (infra/kubernetes/base/monitoring/).
    # Must sit under spec.kafka — the Strimzi v1 API rejects it at spec level.
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml

  # Strimzi Kafka Exporter — adds consumer-group lag metrics on :9308.
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 200m

  entityOperator:
    topicOperator:
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 500m
    userOperator:
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 500m
