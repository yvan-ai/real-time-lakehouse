---
# Marquez — OpenLineage reference backend (ADR-0008).
# API + web UI in a single pod with tight limits (~512 Mi total, WSL2 budget).
# Storage: dedicated `marquez` database in the existing Postgres (streaming ns),
# created by db-init-job.yaml (applied by bootstrap.sh). Flyway migrations run
# automatically on API startup.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez
  namespace: lineage
  labels:
    app: marquez
    app.kubernetes.io/part-of: real-time-lakehouse
spec:
  replicas: 1
  # Recreate: the lineage quota fits exactly one pod — a rolling update would
  # leave the replacement Pending forever.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: marquez
  template:
    metadata:
      labels:
        app: marquez
    spec:
      containers:
        - name: api
          image: marquezproject/marquez:0.49.0
          env:
            - name: MARQUEZ_CONFIG
              value: /etc/marquez/marquez.yml
            - name: MARQUEZ_PORT
              value: "5000"
            - name: MARQUEZ_ADMIN_PORT
              value: "5001"
            - name: POSTGRES_HOST
              value: postgres.streaming.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: marquez
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: marquez-db-credentials
                  key: MARQUEZ_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marquez-db-credentials
                  key: MARQUEZ_DB_PASSWORD
            # Keep the Dropwizard JVM inside the 384 Mi container limit.
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx256m -Xms128m"
          ports:
            - name: api
              containerPort: 5000
            - name: admin
              containerPort: 5001
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/marquez
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 384Mi
              cpu: 500m
        - name: web
          image: marquezproject/marquez-web:0.49.0
          env:
            # Same pod — the web proxy reaches the API over localhost.
            - name: MARQUEZ_HOST
              value: localhost
            - name: MARQUEZ_PORT
              value: "5000"
            - name: WEB_PORT
              value: "3000"
          ports:
            - name: web
              containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: config
          configMap:
            name: marquez-config
