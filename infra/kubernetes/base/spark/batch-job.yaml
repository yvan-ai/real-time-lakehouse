---
# Packages downloaded at runtime from Maven Central.
# On first run this takes ~5 min; subsequent runs use the ephemeral /tmp cache
# inside the same pod (no cross-pod caching — acceptable for local dev).
apiVersion: batch/v1
kind: Job
metadata:
  name: batch-pipeline
  namespace: spark
  labels:
    app: batch-pipeline
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: batch
spec:
  # Do not retry on failure — inspect logs, fix, re-run manually.
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: batch-pipeline
    spec:
      restartPolicy: Never
      containers:
        - name: spark-batch
          image: apache/spark:3.5.3-python3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              PACKAGES="org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3"

              run_job() {
                /opt/spark/bin/spark-submit \
                  --master "local[2]" \
                  --packages "${PACKAGES}" \
                  --py-files /scripts/lakehouse_common.py \
                  --conf "spark.driver.extraJavaOptions=-Divy.cache.dir=/tmp/.ivy -Divy.home=/tmp/.ivy" \
                  "$1"
              }

              echo "[1/3] Bronze ingest — Kafka → raw Iceberg"
              run_job /scripts/01_bronze_ingest.py

              echo "[2/3] Silver transform — Bronze → Silver"
              run_job /scripts/02_silver_transform.py

              echo "[3/3] Gold aggregate — Silver → Gold"
              run_job /scripts/03_gold_aggregate.py

              echo "=== Batch pipeline complete ==="
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: KAFKA_BOOTSTRAP
              value: "kafka-dev-kafka-bootstrap.streaming.svc.cluster.local:9092"
            - name: NESSIE_URI
              value: "http://nessie.lakehouse.svc.cluster.local:19120/api/v1"
            - name: MINIO_ENDPOINT
              value: "http://minio.lakehouse.svc.cluster.local:9000"
          resources:
            requests:
              memory: "1Gi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: batch-spark-jobs
