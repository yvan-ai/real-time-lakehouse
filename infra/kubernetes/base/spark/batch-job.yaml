---
# Runs on the prebaked spark-batch image (pipelines/batch/Dockerfile): all
# jars are bundled at build time, so no Maven Central downloads at runtime.
# The image tag is managed by the kustomization (CD bumps it on main) —
# apply with `kubectl apply -k infra/kubernetes/base/spark/` (run-batch.sh).
apiVersion: batch/v1
kind: Job
metadata:
  name: batch-pipeline
  namespace: spark
  labels:
    app: batch-pipeline
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: batch
spec:
  # Do not retry on failure — inspect logs, fix, re-run manually.
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: batch-pipeline
    spec:
      restartPolicy: Never
      containers:
        - name: spark-batch
          image: spark-batch
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              # OpenLineage — automatic Bronze→Silver→Gold lineage to Marquez
              # (ADR-0008). Only enabled when OPENLINEAGE_URL is set, so the
              # batch still runs on clusters without the lineage stack.
              # The listener jar is baked into the image alongside the others.
              OL_CONFS=()
              if [[ -n "${OPENLINEAGE_URL:-}" ]]; then
                OL_CONFS=(
                  --conf "spark.extraListeners=io.openlineage.spark.agent.OpenLineageSparkListener"
                  --conf "spark.openlineage.transport.type=http"
                  --conf "spark.openlineage.transport.url=${OPENLINEAGE_URL}"
                  # The Marquez API answers slowly from cold on its 500m-CPU
                  # pod — the default 5s read timeout drops the first events.
                  --conf "spark.openlineage.transport.timeoutInMillis=30000"
                  --conf "spark.openlineage.namespace=lakehouse"
                )
              fi

              run_job() {
                /opt/spark/bin/spark-submit \
                  --master "local[2]" \
                  --py-files /scripts/lakehouse_common.py \
                  "${OL_CONFS[@]}" \
                  "$1"
              }

              echo "[1/3] Bronze ingest — Kafka → raw Iceberg"
              run_job /scripts/01_bronze_ingest.py

              echo "[2/3] Silver transform — Bronze → Silver"
              run_job /scripts/02_silver_transform.py

              echo "[3/3] Gold aggregate — Silver → Gold"
              run_job /scripts/03_gold_aggregate.py

              echo "=== Batch pipeline complete ==="
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: KAFKA_BOOTSTRAP
              value: "kafka-dev-kafka-bootstrap.streaming.svc.cluster.local:9092"
            - name: NESSIE_URI
              value: "http://nessie.lakehouse.svc.cluster.local:19120/api/v1"
            - name: MINIO_ENDPOINT
              value: "http://minio.lakehouse.svc.cluster.local:9000"
            - name: OPENLINEAGE_URL
              value: "http://marquez.lineage.svc.cluster.local:5000"
          resources:
            requests:
              memory: "1Gi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: batch-spark-jobs
