apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-config
  namespace: lakehouse
  labels:
    app: trino
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: storage-query
data:
  # ── Coordinator ────────────────────────────────────────────────────────────
  # Single-node setup: coordinator also acts as worker.
  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=true
    http-server.http.port=8080
    discovery.uri=http://localhost:8080
    query.max-memory=384MB
    query.max-memory-per-node=256MB

  jvm.config: |
    -server
    -Xmx1G
    -XX:G1HeapRegionSize=32M
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/var/log/trino/
    -XX:+ExitOnOutOfMemoryError
    -XX:ReservedCodeCacheSize=256M
    -Djdk.attach.allowAttachSelf=true
    -Djdk.nio.maxCachedBufferSize=2000000

  node.properties: |
    node.environment=local
    node.id=trino-coordinator-0
    node.data-dir=/data/trino

  log.properties: |
    io.trino=INFO

  # ── Iceberg catalog — Nessie REST catalog (no HMS, metadata on S3) ──────────
  # Trino 435 removed the 'hadoop' catalog type; Nessie is the lightweight
  # no-metastore replacement for local dev.
  # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are injected via the minio-credentials
  # Secret; the native S3 filesystem reads standard AWS env vars automatically.
  iceberg.properties: |
    connector.name=iceberg
    iceberg.catalog.type=nessie
    iceberg.nessie-catalog.uri=http://nessie.lakehouse.svc.cluster.local:19120/api/v1
    iceberg.nessie-catalog.default-warehouse-dir=s3://lakehouse/warehouse
    fs.native-s3.enabled=true
    s3.endpoint=http://minio.lakehouse.svc.cluster.local:9000
    s3.path-style-access=true
    s3.region=us-east-1
    iceberg.file-format=PARQUET
    iceberg.compression-codec=SNAPPY
