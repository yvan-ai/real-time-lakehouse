# JMX Prometheus Exporter configuration for Strimzi Kafka.
# Referenced by the Kafka CR metricsConfig stanza in kafka-cluster.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics
  namespace: streaming
data:
  kafka-metrics-config.yml: |
    # Expose all JMX metrics — filter down in Prometheus relabeling if needed.
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      # Broker topic metrics
      - pattern: "kafka.server<type=BrokerTopicMetrics, name=(.+), topic=(.+)><>Count"
        name: kafka_server_brokertopicmetrics_$1_total
        labels:
          topic: "$2"

      - pattern: "kafka.server<type=BrokerTopicMetrics, name=(.+)><>Count"
        name: kafka_server_brokertopicmetrics_$1_total

      # Replica manager
      - pattern: "kafka.server<type=ReplicaManager, name=(.+)><>Value"
        name: kafka_server_replicamanager_$1

      # Controller
      - pattern: "kafka.controller<type=KafkaController, name=(.+)><>Value"
        name: kafka_controller_kafkacontroller_$1

      # Network request metrics
      - pattern: "kafka.network<type=RequestMetrics, name=TotalTimeMs, request=(.+)><>(\\.+)"
        name: kafka_network_requestmetrics_totaltimems
        labels:
          request: "$1"
          quantile: "$2"

      # Log metrics
      - pattern: "kafka.log<type=Log, name=(.+), topic=(.+), partition=(.+)><>Value"
        name: kafka_log_log_$1
        labels:
          topic: "$2"
          partition: "$3"

      # Purgatory
      - pattern: "kafka.server<type=DelayedOperationPurgatory, name=PurgatorySize, delayedOperation=(.+)><>Value"
        name: kafka_server_delayedoperationpurgatory_purgatorysize
        labels:
          delayed_operation: "$1"

      # JVM
      - pattern: "java.lang<type=GarbageCollector, name=(.+)><>CollectionCount"
        name: jvm_gc_collection_count_total
        labels:
          gc: "$1"
      - pattern: "java.lang<type=GarbageCollector, name=(.+)><>CollectionTime"
        name: jvm_gc_collection_time_ms_total
        labels:
          gc: "$1"
      - pattern: "java.lang<type=Memory><HeapMemoryUsage>used"
        name: jvm_memory_heap_used_bytes
      - pattern: "java.lang<type=Memory><HeapMemoryUsage>max"
        name: jvm_memory_heap_max_bytes
