# ── lineage (Marquez — OpenLineage backend) ────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: lineage
  labels:
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: lineage
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: lineage-quota
  namespace: lineage
spec:
  hard:
    # Single Marquez pod (API 384 Mi + web 128 Mi) — see ADR-0008.
    requests.memory: "512Mi"
    limits.memory: "768Mi"
    requests.cpu: "300m"
    limits.cpu: "1"
    pods: "10"
---
apiVersion: v1
kind: LimitRange
