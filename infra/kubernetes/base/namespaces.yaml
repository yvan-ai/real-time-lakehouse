# Namespace definitions, ResourceQuotas, and LimitRanges for the real-time lakehouse.
# RAM budget: ~9 GB usable (10 GB cap minus ~1 GB for k3s system pods).
# Quotas are hard ceilings; containers must always declare requests+limits.
---
# ── flink (stream processing jobs) ────────────────────────────────────────────
# Isolated from streaming to avoid quota contention with Kafka + Debezium Connect.
apiVersion: v1
kind: Namespace
metadata:
  name: flink
  labels:
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: processing
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flink-quota
  namespace: flink
spec:
  hard:
    requests.memory: "4Gi"
    limits.memory: "4Gi"
    requests.cpu: "3"
    limits.cpu: "5"
    pods: "15"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: flink-defaults
  namespace: flink
spec:
  limits:
    - type: Container
      default:
        memory: "512Mi"
        cpu: "500m"
      defaultRequest:
        memory: "256Mi"
        cpu: "100m"
      max:
        memory: "2Gi"
        cpu: "2"
---
# ── streaming (Kafka, Debezium) ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: streaming
  labels:
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: ingestion
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: streaming-quota
  namespace: streaming
spec:
  hard:
    requests.memory: "2Gi"
    limits.memory: "4Gi"
    requests.cpu: "2"
    limits.cpu: "6"
    pods: "20"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: streaming-defaults
  namespace: streaming
spec:
  limits:
    - type: Container
      default:
        memory: "512Mi"
        cpu: "500m"
      defaultRequest:
        memory: "128Mi"
        cpu: "100m"
      max:
        memory: "2Gi"
        cpu: "2"
---
