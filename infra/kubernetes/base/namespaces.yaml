# ── monitoring (Prometheus, Grafana, OpenLineage) ──────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: observability
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
spec:
  hard:
    # Sized for prometheus + grafana + kube-state-metrics + node-exporter
    # + pushgateway (quality-gate metrics).
    requests.memory: "768Mi"
    limits.memory: "1536Mi"
    requests.cpu: "500m"
    limits.cpu: "2"
    pods: "15"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-defaults
  namespace: monitoring
spec:
  limits:
    - type: Container
      default:
        memory: "256Mi"
        cpu: "200m"
      defaultRequest:
        memory: "128Mi"
        cpu: "50m"
      max:
        memory: "512Mi"
        cpu: "500m"
---
