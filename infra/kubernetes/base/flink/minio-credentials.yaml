# Production: ExternalSecret syncs MinIO credentials from Vault into the flink namespace.
# For local dev, create the secret manually (same values as minio.env):
#
#   kubectl create secret generic minio-credentials-flink -n flink \
#     --from-literal=MINIO_ROOT_USER=<access_key> \
#     --from-literal=MINIO_ROOT_PASSWORD=<secret_key>
#
# Never commit plaintext credentials.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials-flink
  namespace: flink
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-credentials-flink
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: secret/lakehouse/minio
        property: access_key
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: secret/lakehouse/minio
        property: secret_key
