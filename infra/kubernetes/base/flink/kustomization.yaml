apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flink

resources:
- namespace.yaml
- flink-rbac.yaml
- flink-deployment.yaml
  # minio-credentials.yaml (ExternalSecret) excluded — requires ESO CRDs.
  # Create the secret manually before applying:
  #   kubectl create secret generic minio-credentials-flink -n flink \
  #     --from-literal=MINIO_ROOT_USER=<access_key> \
  #     --from-literal=MINIO_ROOT_PASSWORD=<secret_key>
  # Uncomment when ESO is installed:
  # - minio-credentials.yaml

# CD pipeline updates this tag via `kustomize edit set image`.
images:
- name: flink-order-revenue
  newName: ghcr.io/yvan-ai/real-time-lakehouse/flink-order-revenue
  newTag: sha-7930872
