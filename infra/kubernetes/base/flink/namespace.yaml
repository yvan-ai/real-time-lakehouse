---
apiVersion: v1
kind: Namespace
metadata:
  name: flink
  labels:
    app.kubernetes.io/part-of: real-time-lakehouse
    layer: processing
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flink-quota
  namespace: flink
spec:
  hard:
    requests.memory: "2Gi"
    limits.memory: "3Gi"
    requests.cpu: "1"
    limits.cpu: "3"
    pods: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: flink-defaults
  namespace: flink
spec:
  limits:
    - type: Container
      default:
        memory: "512Mi"
        cpu: "500m"
      defaultRequest:
        memory: "256Mi"
        cpu: "100m"
      max:
        memory: "2Gi"
        cpu: "2"
