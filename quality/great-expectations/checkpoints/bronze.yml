name: bronze
config_version: 1.0
class_name: Checkpoint
run_name_template: "%Y%m%d-%H%M%S-bronze"
template_name: null
module_name: great_expectations.checkpoint

validations:
  - batch_request:
      datasource_name: trino_lakehouse
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: raw.kafka_events
    expectation_suite_name: bronze_kafka_events

  - batch_request:
      datasource_name: trino_lakehouse
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: raw.cdc_orders
    expectation_suite_name: bronze_cdc_orders

  - batch_request:
      datasource_name: trino_lakehouse
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: raw.cdc_customers
    expectation_suite_name: bronze_cdc_customers

action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction

  - name: store_evaluation_params
    action:
      class_name: StoreEvaluationParametersAction

  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
      site_names:
        - local_site

evaluation_parameters: {}
runtime_configuration: {}
