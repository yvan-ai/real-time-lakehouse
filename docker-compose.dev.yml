# Lightweight dev stack — pipeline development without a Kubernetes cluster.
#
#   docker compose -f docker-compose.dev.yml up -d     (or: make dev-up)
#
# Provides the four external dependencies the Spark / Flink jobs need:
# Postgres (CDC source), Kafka (KRaft, single broker), MinIO (S3) and
# Nessie (Iceberg REST catalog). The full production-like environment runs
# on k3s — see ./scripts/bootstrap.sh.
#
# Credentials come from a root `.env` file (see .env.example); the defaults
# below are for local development only.

name: lakehouse-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lakehouse
      POSTGRES_USER: ${POSTGRES_USER:-lakehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lakehouse-dev}
    # wal_level=logical enables Debezium logical replication
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - "5432:5432"
    volumes:
      - ./infra/kubernetes/base/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lakehouse}"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"   # host access: localhost:29092
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: create the warehouse bucket then exit.
  minio-init:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/lakehouse &&
      echo 'Bucket lakehouse ready.'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  nessie:
    # Same version as the k3s deployment (infra/kubernetes/base/nessie)
    image: ghcr.io/projectnessie/nessie:0.62.0
    environment:
      nessie.version.store.type: IN_MEMORY   # dev only — no persistence
    ports:
      - "19120:19120"
    depends_on:
      minio:
        condition: service_healthy

  # ── BI serving (roadmap pillar 9) — opt-in profile, ~1.5 Gi Docker-side ────
  # Runs OUTSIDE the k3s RAM budget. Start with:
  #   docker compose -f docker-compose.dev.yml --profile bi up -d superset
  # Reach the cluster's Trino first (from WSL):
  #   kubectl port-forward svc/trino 8080:8080 -n lakehouse --address 0.0.0.0
  # UI: http://localhost:8088 (admin / $SUPERSET_ADMIN_PASSWORD, default admin).
  # Dashboard exports live in observability/superset/ — see its README.
  # Airbyte would slot into this same profile on beefier machines (ADR-0011).
  superset:
    image: apache/superset:4.1.1
    profiles: ["bi"]
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-dev-only-not-a-secret}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    command:
      - /bin/bash
      - -c
      - |
        set -e
        pip install --no-cache-dir --quiet trino
        superset db upgrade
        superset fab create-admin \
          --username admin --password "$${SUPERSET_ADMIN_PASSWORD}" \
          --firstname Lakehouse --lastname Admin \
          --email admin@lakehouse.local || true
        superset init
        # Pre-register the Trino connection (idempotent): the port-forward
        # above exposes the in-cluster Trino on the Docker host.
        superset set-database-uri \
          --database_name Trino-Iceberg \
          --uri "trino://admin@host.docker.internal:8080/iceberg" || true
        superset run -h 0.0.0.0 -p 8088
    ports:
      - "8088:8088"
    extra_hosts:
      # Linux engines need the host-gateway alias; Docker Desktop has it built in.
      - "host.docker.internal:host-gateway"
    volumes:
      - superset-home:/app/superset_home
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  minio-data:
  superset-home:
