# dbt project — SQL-first Gold layer on Trino (roadmap pillar 5).
# Replaces 03_gold_aggregate.py on the Airflow path; Spark keeps producing
# Bronze/Silver (CDC parsing) and remains the Gold fallback in run-batch.sh.
name: lakehouse
version: "1.0.0"
config-version: 2

profile: lakehouse

model-paths: ["models"]
test-paths: ["tests"]
target-path: target
clean-targets: [target, dbt_packages]

models:
  lakehouse:
    gold:
      # Copy-on-write refresh, same strategy as the Spark job it replaces
      # (full rebuild per run — the tables are small aggregates).
      +materialized: table
