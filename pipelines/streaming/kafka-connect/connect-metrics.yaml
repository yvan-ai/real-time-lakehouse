# JMX Prometheus Exporter configuration for the Debezium Kafka Connect cluster.
# Referenced by the KafkaConnect CR metricsConfig stanza (kafka-connect.yaml).
# Strimzi exposes the exporter on port 9404 (scrape job `kafka-connect`).
apiVersion: v1
kind: ConfigMap
metadata:
  name: connect-metrics
  namespace: streaming
data:
  connect-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      # Connector status — 1-valued metric with a status label
      # (running / paused / failed / destroyed). Drives DebeziumConnectorDown.
      - pattern: 'kafka.connect<type=connector-metrics, connector=(.+)><>status: ([a-z-]+)'
        name: kafka_connect_connector_status
        value: 1
        labels:
          connector: "$1"
          status: "$2"

      # Per-task status
      - pattern: 'kafka.connect<type=connector-task-metrics, connector=(.+), task=(.+)><>status: ([a-z-]+)'
        name: kafka_connect_connector_task_status
        value: 1
        labels:
          connector: "$1"
          task: "$2"
          status: "$3"

      # Worker-level connector/task counts and startup failures
      - pattern: "kafka.connect<type=connect-worker-metrics, connector=(.+)><>([a-z-]+)"
        name: kafka_connect_worker_connector_$2
        labels:
          connector: "$1"
        type: GAUGE
      - pattern: "kafka.connect<type=connect-worker-metrics><>([a-z-]+)"
        name: kafka_connect_worker_metrics_$1
        type: GAUGE

      # Source task throughput (records polled / written per second)
      - pattern: "kafka.connect<type=source-task-metrics, connector=(.+), task=(.+)><>([a-z-]+)"
        name: kafka_connect_source_task_$3
        labels:
          connector: "$1"
          task: "$2"
        type: GAUGE

      # Debezium connector internals — MilliSecondsBehindSource is the CDC
      # freshness signal (WAL streaming lag as seen by the connector).
      - pattern: "debezium.([a-z]+)<type=connector-metrics, context=([a-z]+), server=([^>]+)>([A-Za-z]+)"
        name: debezium_metrics_$4
        labels:
          plugin: "$1"
          context: "$2"
          server: "$3"
