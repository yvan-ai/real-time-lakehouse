apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: streaming

  # debezium-db-credentials.yaml (ExternalSecret) excluded — requires ESO CRDs.
  # Create the secret manually before applying:
  #   kubectl create secret generic debezium-db-credentials -n streaming \
  #     --from-literal=username=debezium \
  #     --from-literal=password=<debezium_password>
  # Uncomment the line below when ESO is installed:
  # - debezium-db-credentials.yaml
resources:
- connect-metrics.yaml
- kafka-connect.yaml
- debezium-postgres.yaml

# CD pipeline updates this tag via `kustomize edit set image`.
images:
- name: kafka-connect-lakehouse
  newName: ghcr.io/yvan-ai/real-time-lakehouse/kafka-connect-lakehouse
  newTag: sha-8979aea
