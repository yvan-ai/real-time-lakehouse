# Production: ExternalSecret (External Secrets Operator + Vault/AWS SM).
# For local dev, create the Secret manually and gitignore it:
#
#   kubectl create secret generic debezium-db-credentials \
#     --namespace streaming \
#     --from-literal=username=debezium \
#     --from-literal=password=<debezium_password>
#
# Never commit plaintext credentials.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: debezium-db-credentials
  namespace: streaming
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    # Must match the secretName referenced by KafkaConnect.template.pod.volumes
    name: debezium-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/streaming/debezium
        property: username
    - secretKey: password
      remoteRef:
        key: secret/streaming/debezium
        property: password
