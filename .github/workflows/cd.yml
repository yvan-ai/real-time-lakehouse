name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Update image tags in kustomization.yaml and commit ─────────────────
  update-image-tags:
    name: Update Image Tags
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    outputs:
      sha_short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT so the push triggers downstream ArgoCD detection.
          # Falls back to GITHUB_TOKEN (will NOT re-trigger CI due to [skip ci]).
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Flink job image tag
        run: |
          cd infra/kubernetes/base/flink
          kustomize edit set image \
            flink-order-revenue=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/flink-order-revenue:sha-${{ steps.sha.outputs.short }}

      - name: Update Kafka Connect image tag
        run: |
          cd pipelines/streaming/kafka-connect
          kustomize edit set image \
            kafka-connect-lakehouse=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/kafka-connect-lakehouse:sha-${{ steps.sha.outputs.short }}

      - name: Update Spark batch image tag
        run: |
          cd infra/kubernetes/base/spark
          kustomize edit set image \
            spark-batch=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/spark-batch:sha-${{ steps.sha.outputs.short }}

      - name: Commit & push updated tags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            infra/kubernetes/base/flink/kustomization.yaml \
            infra/kubernetes/base/spark/kustomization.yaml \
            pipelines/streaming/kafka-connect/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No image tag changes to commit."
          else
            git commit -m "chore(cd): bump image tags to sha-${{ steps.sha.outputs.short }} [skip ci]"
            git push origin main
          fi

  # ── 2. Trigger ArgoCD sync ────────────────────────────────────────────────
  argocd-sync:
    name: ArgoCD Sync
    runs-on: ubuntu-latest
    needs: update-image-tags
    environment: production          # requires ARGOCD_SERVER + ARGOCD_AUTH_TOKEN env secrets
    steps:
      - name: Check ArgoCD configuration
        id: argocd
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          if [ -n "$ARGOCD_SERVER" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ARGOCD_SERVER secret not set — skipping ArgoCD sync."
          fi

      - name: Install ArgoCD CLI
        if: steps.argocd.outputs.configured == 'true'
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Sync lakehouse-local app
        if: steps.argocd.outputs.configured == 'true'
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync lakehouse-local \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --prune \
            --timeout 300

      - name: Wait for lakehouse-local to be healthy
        if: steps.argocd.outputs.configured == 'true'
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app wait lakehouse-local \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --health \
            --timeout 600

      - name: Sync lakehouse-cloud app (if configured)
        if: steps.argocd.outputs.configured == 'true'
        continue-on-error: true      # skip gracefully if cloud app not yet registered
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync lakehouse-cloud \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --prune \
            --timeout 300
