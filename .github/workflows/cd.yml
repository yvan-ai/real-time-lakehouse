name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Update image tags in kustomization.yaml and commit ─────────────────
  update-image-tags:
    name: Update Image Tags
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    outputs:
      sha_short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT so the push triggers downstream ArgoCD detection.
          # Falls back to GITHUB_TOKEN (will NOT re-trigger CI due to [skip ci]).
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Flink job image tag
        run: |
          cd infra/kubernetes/base/flink
          kustomize edit set image \
            flink-order-revenue=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/flink-order-revenue:sha-${{ steps.sha.outputs.short }}

      - name: Update Kafka Connect image tag
        run: |
          cd pipelines/streaming/kafka-connect
          kustomize edit set image \
            kafka-connect-lakehouse=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/kafka-connect-lakehouse:sha-${{ steps.sha.outputs.short }}

      - name: Update Spark batch image tag
        run: |
          cd infra/kubernetes/base/spark
          kustomize edit set image \
            spark-batch=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/spark-batch:sha-${{ steps.sha.outputs.short }}

      - name: Commit & push updated tags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            infra/kubernetes/base/flink/kustomization.yaml \
            infra/kubernetes/base/spark/kustomization.yaml \
            pipelines/streaming/kafka-connect/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No image tag changes to commit."
          else
            git commit -m "chore(cd): bump image tags to sha-${{ steps.sha.outputs.short }} [skip ci]"
            git push origin main
          fi

  # ── 2. ArgoCD reconciliation ──────────────────────────────────────────────
  # No sync step on purpose: the cluster runs ArgoCD *core* (no API server to
  # call from CI — see scripts/install-argocd.sh). The base tags ARE the dev
  # environment: lakehouse-dev auto-syncs from main (default polling interval:
  # 3 min), so the tag-bump commit above is all CD needs to roll the pods.
  # staging/prod pin their own tags in their overlays and only move via a
  # promotion (scripts/promote.sh or the Promote workflow) — ADR-0012.
