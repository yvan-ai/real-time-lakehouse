name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. YAML lint ──────────────────────────────────────────────────────────
  lint-yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint

  # ── 2. Python lint + typecheck ────────────────────────────────────────────
  lint-python:
    name: Python Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check --output-format=github .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: |
          pip install -r requirements-test.txt
          mypy

  # ── 3. Unit tests (pytest + local PySpark) ────────────────────────────────
  test-python:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run pytest
        run: |
          pytest quality/tests \
            -v \
            --tb=short \
            --cov \
            --cov-report=term-missing

  # ── 4. Validate Kubernetes manifests ─────────────────────────────────────
  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Provide placeholder env files for secretGenerator
        # minio.env / marquez.env are gitignored (real credentials); the
        # example files are enough to render manifests for validation.
        run: |
          cp infra/kubernetes/overlays/local/minio.env.example \
             infra/kubernetes/overlays/local/minio.env
          cp infra/kubernetes/overlays/local/marquez.env.example \
             infra/kubernetes/overlays/local/marquez.env
          cp infra/kubernetes/overlays/local/airflow.env.example \
             infra/kubernetes/overlays/local/airflow.env

      - name: kustomize build — local overlay
        # Render inside the workspace: the kubeconform container only mounts
        # /github/workspace, so /tmp on the runner is not visible to it.
        run: kustomize build infra/kubernetes/overlays/local > rendered-manifests.yaml

      - name: kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          entrypoint: /kubeconform
          args: >-
            -strict
            -ignore-missing-schemas
            -kubernetes-version 1.29.0
            -summary
            rendered-manifests.yaml

  # ── 5. Build & push Docker images (main only) ────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-python, test-python, validate-manifests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flink-order-revenue
            context: pipelines/streaming/flink-jobs/order-revenue
            dockerfile: pipelines/streaming/flink-jobs/order-revenue/Dockerfile
          - name: kafka-connect-lakehouse
            context: pipelines/streaming/kafka-connect
            dockerfile: pipelines/streaming/kafka-connect/Dockerfile
          - name: spark-batch
            context: pipelines/batch
            dockerfile: pipelines/batch/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. GX Data Docs → GitHub Pages (main only) ────────────────────────────
  # Requires Pages enabled with the "GitHub Actions" source, which needs a
  # public repository on the free plan. Gate: set the repository variable
  # ENABLE_PAGES=true once Pages is available.
  data-docs:
    name: Publish Data Docs
    runs-on: ubuntu-latest
    needs: [lint-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PAGES == 'true'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install quality dependencies
        run: pip install -r quality/great-expectations/requirements-quality.txt

      - name: Build GX Data Docs (config-only)
        # Renders the expectation-suite pages from the committed suites; the
        # datasource is never queried, so a placeholder connection string is
        # enough. Validation results are produced in-cluster by the quality
        # gate, not in CI.
        env:
          GX_TRINO_CONNECTION_STRING: trino://admin@localhost:8080/iceberg
        run: |
          python - <<'EOF'
          import great_expectations as gx

          context = gx.get_context(context_root_dir="quality/great-expectations")
          context.build_data_docs()
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quality/great-expectations/uncommitted/data_docs/local_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
